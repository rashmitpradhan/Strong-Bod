<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mom.Bod.Strong</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">

<style>
/* KEEP YOUR ORIGINAL UI — trimmed for brevity */
body { font-family: 'Nunito', sans-serif; background:#1A1714; color:#F0EAE0; margin:0; }
.container { max-width:900px; margin:auto; padding:20px; }

.card {
  background:#2A2520;
  border-radius:18px;
  padding:16px;
  margin-bottom:12px;
}

.exercise.done {
  opacity:0.5;
  text-decoration: line-through;
}

/* AUTH */
#authBox {
  text-align:center;
  margin-top:60px;
}

input {
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
}

button {
  padding:10px 16px;
  border-radius:10px;
  border:none;
  background:#F4845F;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- AUTH -->
<div id="authBox">
  <h2>Login</h2>
  <input id="email" placeholder="Email"><br>
  <input id="password" type="password" placeholder="Password"><br><br>
  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div class="container" id="app" style="display:none;"></div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* 🔥 YOUR CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyAYuCRPKJYIaRnRy4Yycs3r9ZnHlaeRIxw",
  authDomain: "strong-bod.firebaseapp.com",
  projectId: "strong-bod",
  storageBucket: "strong-bod.firebasestorage.app",
  messagingSenderId: "124134095155",
  appId: "1:124134095155:web:1284a329355b51af2ee646"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.firebaseApp = { auth, db };

/* ───────── AUTH ───────── */
window.signup = async () => {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;
  await createUserWithEmailAndPassword(auth, email, pass);
};

window.login = async () => {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;
  await signInWithEmailAndPassword(auth, email, pass);
};

window.logout = async () => {
  await signOut(auth);
  location.reload();
};

/* ───────── STATE ───────── */
let userData = { done:{} };

/* ───────── LOAD USER ───────── */
async function loadUser(uid){
  const ref = doc(db,"users",uid);
  const snap = await getDoc(ref);

  if(snap.exists()){
    userData = snap.data();
  } else {
    const local = localStorage.getItem("mbs");
    if(local) userData = JSON.parse(local);
  }

  render();
}

/* ───────── SAVE USER ───────── */
async function saveUser(uid){
  await setDoc(doc(db,"users",uid), userData);
  localStorage.setItem("mbs", JSON.stringify(userData));
}

/* ───────── AUTH STATE ───────── */
onAuthStateChanged(auth, (user)=>{
  if(user){
    document.getElementById("authBox").style.display="none";
    document.getElementById("app").style.display="block";
    loadUser(user.uid);
  }
});

/* ───────── YOUR ORIGINAL DATA (PASTE FULL HERE) ───────── */
const WORKOUT_DATA = [
  {dayNum:1, exercises:["Glute Bridge","Heel Slides"]},
  {dayNum:2, exercises:["Clamshell","Bird Dog"]},
  {dayNum:3, isRest:true}
];

/* ───────── TOGGLE ───────── */
window.toggleExercise = async (key)=>{
  const user = auth.currentUser;
  if(!user) return;

  userData.done[key] = !userData.done[key];

  await saveUser(user.uid);
  render();
};

/* ───────── RENDER ───────── */
function render(){
  const app = document.getElementById("app");
  app.innerHTML = "";

  const logoutBtn = document.createElement("button");
  logoutBtn.innerText = "Logout";
  logoutBtn.onclick = logout;
  app.appendChild(logoutBtn);

  WORKOUT_DATA.forEach(d=>{
    const card = document.createElement("div");
    card.className="card";

    if(d.isRest){
      card.innerHTML = "<h3>Rest Day 😌</h3>";
    } else {
      const title = document.createElement("h3");
      title.innerText = `Day ${d.dayNum}`;
      card.appendChild(title);

      d.exercises.forEach((ex,i)=>{
        const key = `d${d.dayNum}e${i}`;
        const done = userData.done[key];

        const row = document.createElement("div");
        row.className = "exercise " + (done ? "done":"");

        const text = document.createElement("span");
        text.innerText = ex;

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.checked = !!done;
        checkbox.onchange = ()=> toggleExercise(key);

        row.appendChild(text);
        row.appendChild(checkbox);

        card.appendChild(row);
      });
    }

    app.appendChild(card);
  });
}
</script>

</body>
</html>
